<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统 - 管理端</div>
        <div class="nav-links">
            <a href="admin-index.html" class="active">首页</a>
            <a href="admin-notice.html">公告管理</a>
            <a href="admin-activity.html">活动管理</a>
            <a href="admin-salary.html">工资管理</a>
            <a href="admin-staff.html">人员管理</a>
            <a href="admin-message.html">留言管理</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <h2>管理员控制台</h2>
            <p style="color: #909399; margin-top: 10px;">欢迎登录大学退休教职工管理系统</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px;">
            <!-- 统计卡片 -->
            <div class="card" style="text-align: center; cursor: pointer;" onclick="location.href='admin-staff.html'">
                <h1 style="color: #409eff; font-size: 36px;" id="staffCount">0</h1>
                <p style="color: #909399;">退休人员总数</p>
            </div>

            <div class="card" style="text-align: center; cursor: pointer;" onclick="location.href='admin-notice.html'">
                <h1 style="color: #67c23a; font-size: 36px;" id="noticeCount">0</h1>
                <p style="color: #909399;">公告总数</p>
            </div>

            <div class="card" style="text-align: center; cursor: pointer;" onclick="location.href='admin-activity.html'">
                <h1 style="color: #e6a23c; font-size: 36px;" id="activityCount">0</h1>
                <p style="color: #909399;">活动总数</p>
            </div>

            <div class="card" style="text-align: center; cursor: pointer;" onclick="location.href='admin-salary.html'">
                <h1 style="color: #f56c6c; font-size: 36px;" id="appealCount">0</h1>
                <p style="color: #909399;">待处理申诉</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <!-- 最新申诉 -->
            <div class="card">
                <div class="card-header">
                    <h3>待处理申诉</h3>
                    <a href="admin-salary.html">更多</a>
                </div>
                <div id="appealList">
                    <p style="color: #909399;">暂无待处理申诉</p>
                </div>
            </div>

            <!-- 最新活动报名 -->
            <div class="card">
                <div class="card-header">
                    <h3>最新活动报名</h3>
                    <a href="admin-activity.html">更多</a>
                </div>
                <div id="registrationList">
                    <p style="color: #909399;">暂无报名记录</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        // 检查登录和管理员权限
        if (!checkLogin() || !isAdmin()) {
            window.location.href = '../../login.html';
        }

        // 渲染用户信息
        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>管理员: ${userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        // 加载统计数据
        async function loadStats() {
            // 获取人员数量
            const staffResult = await get('/api/staff/list');
            if (staffResult.code === 200 && staffResult.data) {
                document.getElementById('staffCount').textContent = staffResult.data.length;
            }

            // 获取公告数量
            const noticeResult = await get('/api/notice/list');
            if (noticeResult.code === 200 && noticeResult.data) {
                document.getElementById('noticeCount').textContent = noticeResult.data.length;
            }

            // 获取活动数量
            const activityResult = await get('/api/activity/list');
            if (activityResult.code === 200 && activityResult.data) {
                document.getElementById('activityCount').textContent = activityResult.data.length;
            }

            // 获取申诉数量
            const appealResult = await get('/api/salary/appeals');
            if (appealResult.code === 200 && appealResult.data) {
                const pendingAppeals = appealResult.data.filter(a => a.status === 0);
                document.getElementById('appealCount').textContent = pendingAppeals.length;

                // 渲染待处理申诉
                if (pendingAppeals.length > 0) {
                    document.getElementById('appealList').innerHTML = pendingAppeals.slice(0, 5).map(item => `
                        <div style="padding: 10px 0; border-bottom: 1px solid #ebeef5;">
                            <span>${item.staffName}</span>
                            <span style="color: #909399; font-size: 12px; margin-left: 10px;">${item.yearMonth}</span>
                            <span class="status-tag pending" style="float: right;">待处理</span>
                        </div>
                    `).join('');
                }
            }
        }

        loadStats();
    </script>
</body>
</html>
