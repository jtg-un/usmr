<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言管理 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统 - 管理端</div>
        <div class="nav-links">
            <a href="admin-index.html">首页</a>
            <a href="admin-notice.html">公告管理</a>
            <a href="admin-activity.html">活动管理</a>
            <a href="admin-salary.html">工资管理</a>
            <a href="admin-staff.html">人员管理</a>
            <a href="admin-message.html" class="active">留言管理</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>用户留言管理</h3>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>留言人</th>
                        <th>留言内容</th>
                        <th>留言时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="messageList"></tbody>
            </table>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin() || !isAdmin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>管理员: ${userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        async function loadMessages() {
            const result = await get('/api/message/list');
            if (result.code === 200 && result.data) {
                const tbody = document.getElementById('messageList');
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #909399;">暂无留言</td></tr>';
                    return;
                }
                tbody.innerHTML = result.data.map(item => `
                    <tr>
                        <td>${item.userName || '用户'}</td>
                        <td style="max-width: 300px; word-break: break-all;">${item.content}</td>
                        <td>${formatDateTime(item.createTime)}</td>
                        <td>
                            <button class="btn btn-danger btn-small" onclick="deleteMessage(${item.cmId})">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function deleteMessage(cmId) {
            if (!confirm('确定要删除此留言吗？')) return;

            const result = await del('/api/message/' + cmId);
            if (result.code === 200) {
                showMessage('删除成功');
                loadMessages();
            } else {
                showMessage(result.message || '删除失败', 'error');
            }
        }

        loadMessages();
    </script>
</body>
</html>
