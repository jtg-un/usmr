<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员管理 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .search-form {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 8px;
        }
        .search-form .form-group {
            margin-bottom: 0;
        }
        .search-form .btn-group {
            grid-column: span 4;
            text-align: right;
        }
        .age-range {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .age-range input {
            width: 70px;
        }
        .age-range span {
            color: #909399;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统 - 管理端</div>
        <div class="nav-links">
            <a href="admin-index.html">首页</a>
            <a href="admin-notice.html">公告管理</a>
            <a href="admin-activity.html">活动管理</a>
            <a href="admin-salary.html">工资管理</a>
            <a href="admin-staff.html" class="active">人员管理</a>
            <a href="admin-message.html">留言管理</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>退休人员管理</h3>
                <button class="btn btn-primary" onclick="showAddModal()">+ 添加人员</button>
            </div>

            <!-- 搜索区域 -->
            <div class="search-form">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="searchName" placeholder="输入姓名">
                </div>
                <div class="form-group">
                    <label>原单位</label>
                    <input type="text" id="searchDept" placeholder="输入原单位">
                </div>
                <div class="form-group">
                    <label>职务/职称</label>
                    <input type="text" id="searchTitle" placeholder="输入职务/职称">
                </div>
                <div class="form-group">
                    <label>子女姓名</label>
                    <input type="text" id="searchChildName" placeholder="输入子女姓名">
                </div>
                <div class="form-group">
                    <label>年龄范围</label>
                    <div class="age-range">
                        <input type="number" id="searchAgeMin" placeholder="最小">
                        <span>-</span>
                        <input type="number" id="searchAgeMax" placeholder="最大">
                    </div>
                </div>
                <div class="form-group">
                    <label>退休时间起</label>
                    <input type="date" id="searchRetireDateStart">
                </div>
                <div class="form-group">
                    <label>退休时间止</label>
                    <input type="date" id="searchRetireDateEnd">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="searchStaff()">搜索</button>
                    <button class="btn" onclick="resetSearch()">重置</button>
                </div>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>年龄</th>
                        <th>原单位</th>
                        <th>职务/职称</th>
                        <th>退休时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="staffList"></tbody>
            </table>
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modalTitle">添加退休人员</h3>
                <span class="modal-close" onclick="closeEditModal()">&times;</span>
            </div>
            <div style="padding: 20px; max-height: 500px; overflow-y: auto;">
                <input type="hidden" id="editStaffId">
                <input type="hidden" id="editUserId">
                <div id="accountFields">
                    <div class="form-group">
                        <label>用户名 <span style="color: red;">*</span></label>
                        <input type="text" id="editUsername" placeholder="登录用户名">
                    </div>
                    <div class="form-group">
                        <label>密码 <span style="color: red;">*</span></label>
                        <input type="password" id="editPassword" placeholder="登录密码">
                    </div>
                </div>
                <div class="form-group" id="passwordChangeField" style="display: none;">
                    <label>新密码</label>
                    <input type="password" id="editNewPassword" placeholder="输入新密码（不修改则留空）">
                </div>
                <div class="form-group">
                    <label>姓名 <span style="color: red;">*</span></label>
                    <input type="text" id="editRealName" placeholder="真实姓名">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>性别</label>
                        <select id="editGender">
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>年龄</label>
                        <input type="number" id="editAge" placeholder="年龄">
                    </div>
                </div>
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" id="editIdCard" placeholder="身份证号">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>民族</label>
                        <input type="text" id="editNation" placeholder="民族">
                    </div>
                    <div class="form-group">
                        <label>学历</label>
                        <input type="text" id="editEducation" placeholder="学历">
                    </div>
                </div>
                <div class="form-group">
                    <label>籍贯</label>
                    <input type="text" id="editNativePlace" placeholder="籍贯">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>参加工作时间</label>
                        <input type="date" id="editWorkStartDate">
                    </div>
                    <div class="form-group">
                        <label>退休时间</label>
                        <input type="date" id="editRetireDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>退休前单位</label>
                    <input type="text" id="editFormerDept" placeholder="退休前所在单位">
                </div>
                <div class="form-group">
                    <label>职务/职称</label>
                    <input type="text" id="editJobTitle" placeholder="职务或职称">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveStaff()">保存</button>
            </div>
        </div>
    </div>

    <!-- 查看详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>人员详情</h3>
                <span class="modal-close" onclick="closeDetailModal()">&times;</span>
            </div>
            <div id="staffDetail"></div>
        </div>
    </div>

    <!-- 亲属信息模态框 -->
    <div class="modal" id="relativeModal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h3>亲属信息</h3>
                <span class="modal-close" onclick="closeRelativeModal()">&times;</span>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>关系</th>
                        <th>姓名</th>
                        <th>住址</th>
                        <th>居住面积</th>
                        <th>电话</th>
                        <th>邮箱</th>
                        <th>工作单位</th>
                        <th>QQ/微信</th>
                    </tr>
                </thead>
                <tbody id="relativeList"></tbody>
            </table>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin() || !isAdmin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>管理员: ${userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        async function loadStaff(params = {}) {
            let url = '/api/staff/list';
            const searchParams = [];

            if (params.name) searchParams.push('realName=' + encodeURIComponent(params.name));
            if (params.dept) searchParams.push('formerDept=' + encodeURIComponent(params.dept));
            if (params.title) searchParams.push('jobTitle=' + encodeURIComponent(params.title));
            if (params.ageMin) searchParams.push('ageMin=' + params.ageMin);
            if (params.ageMax) searchParams.push('ageMax=' + params.ageMax);
            if (params.retireDateStart) searchParams.push('retireDateStart=' + params.retireDateStart);
            if (params.retireDateEnd) searchParams.push('retireDateEnd=' + params.retireDateEnd);
            if (params.childName) searchParams.push('childName=' + encodeURIComponent(params.childName));

            if (searchParams.length > 0) {
                url = '/api/staff/search?' + searchParams.join('&');
            }

            const result = await get(url);
            if (result.code === 200 && result.data) {
                const tbody = document.getElementById('staffList');
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #909399;">暂无数据</td></tr>';
                    return;
                }
                tbody.innerHTML = result.data.map(item => `
                    <tr>
                        <td>${item.realName || '-'}</td>
                        <td>${item.gender || '-'}</td>
                        <td>${item.age || '-'}</td>
                        <td>${item.formerDept || '-'}</td>
                        <td>${item.jobTitle || '-'}</td>
                        <td>${item.retireDate || '-'}</td>
                        <td>
                            <button class="btn btn-primary btn-small" onclick="showDetail(${item.staffId})">查看</button>
                            <button class="btn btn-warning btn-small" onclick="editStaff(${item.staffId})">编辑</button>
                            <button class="btn btn-success btn-small" onclick="showRelatives(${item.staffId})">亲属</button>
                            <button class="btn btn-danger btn-small" onclick="deleteStaff(${item.staffId})">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function searchStaff() {
            const params = {
                name: document.getElementById('searchName').value.trim(),
                dept: document.getElementById('searchDept').value.trim(),
                title: document.getElementById('searchTitle').value.trim(),
                childName: document.getElementById('searchChildName').value.trim(),
                ageMin: document.getElementById('searchAgeMin').value,
                ageMax: document.getElementById('searchAgeMax').value,
                retireDateStart: document.getElementById('searchRetireDateStart').value,
                retireDateEnd: document.getElementById('searchRetireDateEnd').value
            };
            loadStaff(params);
        }

        function resetSearch() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchDept').value = '';
            document.getElementById('searchTitle').value = '';
            document.getElementById('searchChildName').value = '';
            document.getElementById('searchAgeMin').value = '';
            document.getElementById('searchAgeMax').value = '';
            document.getElementById('searchRetireDateStart').value = '';
            document.getElementById('searchRetireDateEnd').value = '';
            loadStaff();
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '添加退休人员';
            document.getElementById('editStaffId').value = '';
            document.getElementById('editUsername').value = '';
            document.getElementById('editPassword').value = '';
            document.getElementById('editRealName').value = '';
            document.getElementById('editGender').value = '';
            document.getElementById('editAge').value = '';
            document.getElementById('editIdCard').value = '';
            document.getElementById('editNation').value = '';
            document.getElementById('editEducation').value = '';
            document.getElementById('editNativePlace').value = '';
            document.getElementById('editWorkStartDate').value = '';
            document.getElementById('editRetireDate').value = '';
            document.getElementById('editFormerDept').value = '';
            document.getElementById('editJobTitle').value = '';
            document.getElementById('accountFields').style.display = 'block';
            document.getElementById('editUsername').required = true;
            document.getElementById('editPassword').required = true;
            document.getElementById('editModal').classList.add('show');
        }

        async function editStaff(staffId) {
            const result = await get('/api/staff/' + staffId);
            if (result.code === 200 && result.data) {
                const d = result.data;
                document.getElementById('modalTitle').textContent = '编辑退休人员';
                document.getElementById('editStaffId').value = d.staffId;
                document.getElementById('editUserId').value = d.staffId;
                document.getElementById('editRealName').value = d.realName || '';
                document.getElementById('editGender').value = d.gender || '';
                document.getElementById('editAge').value = d.age || '';
                document.getElementById('editIdCard').value = d.idCard || '';
                document.getElementById('editNation').value = d.nation || '';
                document.getElementById('editEducation').value = d.education || '';
                document.getElementById('editNativePlace').value = d.nativePlace || '';
                document.getElementById('editWorkStartDate').value = d.workStartDate || '';
                document.getElementById('editRetireDate').value = d.retireDate || '';
                document.getElementById('editFormerDept').value = d.formerDept || '';
                document.getElementById('editJobTitle').value = d.jobTitle || '';
                document.getElementById('accountFields').style.display = 'none';
                document.getElementById('passwordChangeField').style.display = 'block';
                document.getElementById('editNewPassword').value = '';
                document.getElementById('editModal').classList.add('show');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        async function saveStaff() {
            const staffId = document.getElementById('editStaffId').value;
            const isAdd = !staffId;

            const realName = document.getElementById('editRealName').value.trim();
            if (!realName) {
                showMessage('请输入姓名', 'error');
                return;
            }

            if (isAdd) {
                // 添加模式
                const username = document.getElementById('editUsername').value.trim();
                const password = document.getElementById('editPassword').value.trim();

                if (!username) {
                    showMessage('请输入用户名', 'error');
                    return;
                }
                if (!password) {
                    showMessage('请输入密码', 'error');
                    return;
                }

                const workStartDate = document.getElementById('editWorkStartDate').value;
                const retireDate = document.getElementById('editRetireDate').value;

                // 验证参加工作时间必须早于退休时间
                if (workStartDate && retireDate && workStartDate >= retireDate) {
                    showMessage('参加工作时间必须早于退休时间', 'error');
                    return;
                }

                const params = {
                    username: username,
                    password: password,
                    realName: realName,
                    gender: document.getElementById('editGender').value,
                    age: document.getElementById('editAge').value,
                    idCard: document.getElementById('editIdCard').value.trim(),
                    nation: document.getElementById('editNation').value.trim(),
                    education: document.getElementById('editEducation').value.trim(),
                    nativePlace: document.getElementById('editNativePlace').value.trim(),
                    workStartDate: workStartDate,
                    retireDate: retireDate,
                    formerDept: document.getElementById('editFormerDept').value.trim(),
                    jobTitle: document.getElementById('editJobTitle').value.trim()
                };

                const result = await post('/api/staff/add', params);
                if (result.code === 200) {
                    showMessage('添加成功');
                    closeEditModal();
                    loadStaff();
                } else {
                    showMessage(result.message || '添加失败', 'error');
                }
            } else {
                // 编辑模式
                const workStartDate = document.getElementById('editWorkStartDate').value;
                const retireDate = document.getElementById('editRetireDate').value;

                // 验证参加工作时间必须早于退休时间
                if (workStartDate && retireDate && workStartDate >= retireDate) {
                    showMessage('参加工作时间必须早于退休时间', 'error');
                    return;
                }

                const params = {
                    staffId: parseInt(staffId),
                    realName: realName,
                    gender: document.getElementById('editGender').value,
                    age: document.getElementById('editAge').value ? parseInt(document.getElementById('editAge').value) : null,
                    idCard: document.getElementById('editIdCard').value.trim(),
                    nation: document.getElementById('editNation').value.trim(),
                    education: document.getElementById('editEducation').value.trim(),
                    nativePlace: document.getElementById('editNativePlace').value.trim(),
                    workStartDate: workStartDate,
                    retireDate: retireDate,
                    formerDept: document.getElementById('editFormerDept').value.trim(),
                    jobTitle: document.getElementById('editJobTitle').value.trim()
                };

                const result = await post('/api/staff/update', params);
                if (result.code === 200) {
                    showMessage('更新成功');
                    closeEditModal();
                    loadStaff();
                } else {
                    showMessage(result.message || '更新失败', 'error');
                }

                // 如果填写了新密码，则更新密码
                const newPwd = document.getElementById('editNewPassword').value.trim();
                if (newPwd) {
                    const userId = document.getElementById('editUserId').value;
                    const pwdResult = await post('/api/staff/updatePassword', {
                        userId: parseInt(userId),
                        newPassword: md5(newPwd)
                    });
                    if (pwdResult.code === 200) {
                        showMessage('密码修改成功');
                    } else {
                        showMessage(pwdResult.message || '密码修改失败', 'error');
                    }
                }
            }
        }

        async function deleteStaff(staffId) {
            if (!confirm('确定要删除此人员吗？删除后无法恢复！')) return;

            const result = await del('/api/staff/' + staffId);
            if (result.code === 200) {
                showMessage('删除成功');
                loadStaff();
            } else {
                showMessage(result.message || '删除失败', 'error');
            }
        }

        async function showDetail(id) {
            const result = await get('/api/staff/' + id);
            if (result.code === 200 && result.data) {
                const d = result.data;
                document.getElementById('staffDetail').innerHTML = `
                    <div class="profile-section">
                        <div class="form-group">
                            <label>姓名</label>
                            <p>${d.realName || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>性别</label>
                            <p>${d.gender || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>身份证号</label>
                            <p>${d.idCard || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>年龄</label>
                            <p>${d.age || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>民族</label>
                            <p>${d.nation || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>学历</label>
                            <p>${d.education || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>籍贯</label>
                            <p>${d.nativePlace || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>参加工作时间</label>
                            <p>${d.workStartDate || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>退休时间</label>
                            <p>${d.retireDate || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>退休前单位</label>
                            <p>${d.formerDept || '-'}</p>
                        </div>
                        <div class="form-group">
                            <label>职务/职称</label>
                            <p>${d.jobTitle || '-'}</p>
                        </div>
                    </div>
                `;
                document.getElementById('detailModal').classList.add('show');
            }
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        async function showRelatives(staffId) {
            const result = await get('/api/relative/staff/' + staffId);
            if (result.code === 200) {
                const tbody = document.getElementById('relativeList');
                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #909399;">暂无亲属信息</td></tr>';
                } else {
                    tbody.innerHTML = result.data.map(item => `
                        <tr>
                            <td>${item.relationType || '-'}</td>
                            <td>${item.name || '-'}</td>
                            <td>${item.address || '-'}</td>
                            <td>${item.livingArea ? item.livingArea + '㎡' : '-'}</td>
                            <td>${item.phone || '-'}</td>
                            <td>${item.email || '-'}</td>
                            <td>${item.workplace || '-'}</td>
                            <td>${item.qqWechat || '-'}</td>
                        </tr>
                    `).join('');
                }
                document.getElementById('relativeModal').classList.add('show');
            }
        }

        function closeRelativeModal() {
            document.getElementById('relativeModal').classList.remove('show');
        }

        loadStaff();
    </script>
</body>
</html>
