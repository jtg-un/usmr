<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动管理 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统 - 管理端</div>
        <div class="nav-links">
            <a href="admin-index.html">首页</a>
            <a href="admin-notice.html">公告管理</a>
            <a href="admin-activity.html" class="active">活动管理</a>
            <a href="admin-salary.html">工资管理</a>
            <a href="admin-staff.html">人员管理</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>活动管理</h3>
                <button class="btn btn-primary" onclick="showAddModal()">创建活动</button>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>活动名称</th>
                        <th>类型</th>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>投票数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="activityList"></tbody>
            </table>
        </div>
    </div>

    <!-- 创建活动模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建活动</h3>
                <span class="modal-close" onclick="closeAddModal()">&times;</span>
            </div>
            <form id="activityForm">
                <div class="form-group">
                    <label>活动名称 <span style="color: red;">*</span></label>
                    <input type="text" id="activityTitle" required>
                </div>
                <div class="form-group">
                    <label>活动描述</label>
                    <textarea id="activityDesc" style="width: 100%; height: 100px; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label>活动类型</label>
                    <select id="activityType">
                        <option value="1">普通活动</option>
                        <option value="2">多人活动（大合唱等）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>开始时间 <span style="color: red;">*</span></label>
                    <input type="datetime-local" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>结束时间 <span style="color: red;">*</span></label>
                    <input type="datetime-local" id="endTime" required>
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="submitActivity()">创建</button>
            </div>
        </div>
    </div>

    <!-- 报名统计模态框 -->
    <div class="modal" id="statsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>报名统计</h3>
                <span class="modal-close" onclick="closeStatsModal()">&times;</span>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>报名人</th>
                        <th>报名时间</th>
                        <th>组名</th>
                    </tr>
                </thead>
                <tbody id="registrationList"></tbody>
            </table>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin() || !isAdmin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>管理员: ${userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        async function loadActivities() {
            const result = await get('/api/activity/list');
            if (result.code === 200 && result.data) {
                const tbody = document.getElementById('activityList');
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #909399;">暂无活动</td></tr>';
                    return;
                }
                tbody.innerHTML = result.data.map(item => `
                    <tr>
                        <td>${item.title}</td>
                        <td>${item.type === 2 ? '多人活动' : '普通活动'}</td>
                        <td>${formatDateTime(item.startTime)}</td>
                        <td>${formatDateTime(item.endTime)}</td>
                        <td>${item.voteCount || 0}</td>
                        <td>
                            <button class="btn btn-success btn-small" onclick="showStats(${item.activityId})">报名统计</button>
                            <button class="btn btn-danger btn-small" onclick="deleteActivity(${item.activityId})">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('activityForm').reset();
        }

        async function submitActivity() {
            const title = document.getElementById('activityTitle').value.trim();
            const description = document.getElementById('activityDesc').value.trim();
            const type = parseInt(document.getElementById('activityType').value);
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (!title || !startTime || !endTime) {
                showMessage('请填写完整信息', 'error');
                return;
            }

            const result = await post('/api/activity/create', {
                title,
                description,
                type,
                startTime: startTime.replace('T', ' ') + ':00',
                endTime: endTime.replace('T', ' ') + ':00'
            });

            if (result.code === 200) {
                showMessage('创建成功');
                closeAddModal();
                loadActivities();
            } else {
                showMessage(result.message || '创建失败', 'error');
            }
        }

        async function showStats(activityId) {
            const result = await get('/api/activity/' + activityId + '/registrations');
            if (result.code === 200 && result.data) {
                const tbody = document.getElementById('registrationList');
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #909399;">暂无报名</td></tr>';
                } else {
                    tbody.innerHTML = result.data.map(item => `
                        <tr>
                            <td>${item.staffName || '未知'}</td>
                            <td>${formatDateTime(item.regTime)}</td>
                            <td>${item.groupName || '-'}</td>
                        </tr>
                    `).join('');
                }
                document.getElementById('statsModal').classList.add('show');
            }
        }

        function closeStatsModal() {
            document.getElementById('statsModal').classList.remove('show');
        }

        async function deleteActivity(activityId) {
            if (!confirm('确定要删除此活动吗？相关报名数据也将被删除。')) return;

            const result = await del('/api/activity/' + activityId);
            if (result.code === 200) {
                showMessage('删除成功');
                loadActivities();
            } else {
                showMessage(result.message || '删除失败', 'error');
            }
        }

        loadActivities();
    </script>
</body>
</html>
