<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统 - 管理端</div>
        <div class="nav-links">
            <a href="admin-index.html">首页</a>
            <a href="admin-notice.html" class="active">公告管理</a>
            <a href="admin-activity.html">活动管理</a>
            <a href="admin-salary.html">工资管理</a>
            <a href="admin-staff.html">人员管理</a>
            <a href="admin-message.html">留言管理</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>公告管理</h3>
                <button class="btn btn-primary" onclick="showAddModal()">发布公告</button>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>标题</th>
                        <th>发布时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="noticeList"></tbody>
            </table>
        </div>
    </div>

    <!-- 发布公告模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>发布公告</h3>
                <span class="modal-close" onclick="closeAddModal()">&times;</span>
            </div>
            <form id="noticeForm">
                <div class="form-group">
                    <label>标题 <span style="color: red;">*</span></label>
                    <input type="text" id="noticeTitle" required>
                </div>
                <div class="form-group">
                    <label>内容 <span style="color: red;">*</span></label>
                    <textarea id="noticeContent" style="width: 100%; height: 200px; resize: vertical;" required></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="submitNotice()">发布</button>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin() || !isAdmin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>管理员: ${userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        async function loadNotices() {
            const result = await get('/api/notice/list');
            if (result.code === 200 && result.data) {
                const tbody = document.getElementById('noticeList');
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #909399;">暂无公告</td></tr>';
                    return;
                }
                tbody.innerHTML = result.data.map(item => `
                    <tr>
                        <td>${item.title}</td>
                        <td>${formatDateTime(item.publishTime)}</td>
                        <td>
                            <button class="btn btn-danger btn-small" onclick="deleteNotice(${item.noticeId})">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('noticeTitle').value = '';
            document.getElementById('noticeContent').value = '';
        }

        async function submitNotice() {
            const title = document.getElementById('noticeTitle').value.trim();
            const content = document.getElementById('noticeContent').value.trim();

            if (!title || !content) {
                showMessage('请填写完整信息', 'error');
                return;
            }

            const result = await post('/api/notice/publish', { title, content });
            if (result.code === 200) {
                showMessage('发布成功');
                closeAddModal();
                loadNotices();
            } else {
                showMessage(result.message || '发布失败', 'error');
            }
        }

        async function deleteNotice(noticeId) {
            if (!confirm('确定要删除此公告吗？')) return;

            const result = await del('/api/notice/' + noticeId);
            if (result.code === 200) {
                showMessage('删除成功');
                loadNotices();
            } else {
                showMessage(result.message || '删除失败', 'error');
            }
        }

        loadNotices();
    </script>
</body>
</html>
