<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园公告 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统</div>
        <div class="nav-links">
            <a href="user-index.html">首页</a>
            <a href="user-profile.html">个人信息</a>
            <a href="user-notice.html" class="active">校园公告</a>
            <a href="user-activity.html">活动报名</a>
            <a href="user-salary.html">工资查询</a>
            <a href="user-relative.html">亲属管理</a>
            <a href="user-message.html">站内留言</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>校园公告</h3>
            </div>
            <div id="noticeList"></div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>欢迎, ${userInfo.realName || userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        async function loadNotices() {
            const result = await get('/api/notice/list');
            if (result.code === 200 && result.data) {
                const list = document.getElementById('noticeList');
                if (result.data.length === 0) {
                    list.innerHTML = '<p style="color: #909399; text-align: center; padding: 20px;">暂无公告</p>';
                    return;
                }
                list.innerHTML = result.data.map(item => `
                    <div style="padding: 15px 0; border-bottom: 1px solid #ebeef5; cursor: pointer;" onclick="location.href='user-notice-detail.html?id=${item.noticeId}'">
                        <h4 style="margin-bottom: 8px;">${item.title}</h4>
                        <p style="color: #909399; font-size: 14px;">${formatDateTime(item.publishTime)} | 发布者: ${item.adminName || '管理员'}</p>
                    </div>
                `).join('');
            }
        }

        loadNotices();
    </script>
</body>
</html>
