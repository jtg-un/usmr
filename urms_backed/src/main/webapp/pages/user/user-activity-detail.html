<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .group-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .group-suggestions.show {
            display: block;
        }
        .group-suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
        }
        .group-suggestion-item:hover {
            background: #f5f7fa;
        }
        .form-group {
            position: relative;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统</div>
        <div class="nav-links">
            <a href="user-index.html">首页</a>
            <a href="user-profile.html">个人信息</a>
            <a href="user-notice.html">校园公告</a>
            <a href="user-activity.html" class="active">活动报名</a>
            <a href="user-salary.html">工资查询</a>
            <a href="user-relative.html">亲属管理</a>
            <a href="user-message.html">站内留言</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3 id="activityTitle">活动详情</h3>
                <a href="user-activity.html">返回列表</a>
            </div>
            <div style="padding: 20px;">
                <p><strong>活动描述:</strong> <span id="description"></span></p>
                <p><strong>开始时间:</strong> <span id="startTime"></span></p>
                <p><strong>结束时间:</strong> <span id="endTime"></span></p>
                <p><strong>活动类型:</strong> <span id="type"></span></p>
                <p><strong>当前投票数:</strong> <span id="voteCount"></span></p>

                <div style="margin-top: 20px;">
                    <button class="btn btn-success" id="voteBtn" onclick="vote()">投票</button>
                    <span id="votedText" style="color: #67c23a; display: none;">已投票</span>
                    <button class="btn btn-primary" id="registerBtn" onclick="showRegisterModal()">报名参加</button>
                    <span id="registeredText" style="color: #67c23a; display: none;">已报名</span>
                </div>
            </div>
        </div>

        <!-- 评论区域 -->
        <div class="card" style="margin-top: 20px;">
            <div class="card-header">
                <h3>评论</h3>
            </div>
            <div style="padding: 15px;">
                <textarea id="commentContent" placeholder="发表评论..." style="width: 100%; height: 80px; resize: none; padding: 10px; border: 1px solid #dcdfe6; border-radius: 4px;"></textarea>
                <button class="btn btn-primary btn-small" style="margin-top: 10px;" onclick="submitComment()">发表评论</button>
            </div>
            <div id="commentList" class="comment-list"></div>
        </div>
    </div>

    <!-- 报名模态框 -->
    <div class="modal" id="registerModal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>活动报名</h3>
                <span class="modal-close" onclick="closeRegisterModal()">&times;</span>
            </div>
            <div class="form-group" id="groupNameDiv">
                <label>组名 <span style="color: red;">*</span></label>
                <div style="position: relative;">
                    <input type="text" id="groupName" placeholder="选择已有组或输入新组名" autocomplete="off">
                    <div class="group-suggestions" id="groupSuggestions"></div>
                </div>
                <small style="color: #909399;">多人活动需选择或输入组名，可选择已有小组或创建新小组</small>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeRegisterModal()">取消</button>
                <button class="btn btn-primary" onclick="register()">确认报名</button>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>欢迎, ${userInfo.realName || userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        const activityId = getUrlParam('id');
        let currentActivity = null;
        let groups = []; // 存储组信息（包含组名和人数）

        async function loadActivity() {
            const result = await get('/api/activity/' + activityId);
            if (result.code === 200 && result.data) {
                currentActivity = result.data;
                document.getElementById('activityTitle').textContent = result.data.title;
                document.getElementById('description').textContent = result.data.description || '暂无描述';
                document.getElementById('startTime').textContent = formatDateTime(result.data.startTime);
                document.getElementById('endTime').textContent = formatDateTime(result.data.endTime);
                document.getElementById('type').textContent = result.data.type === 2 ? '多人活动' : '普通活动';
                document.getElementById('voteCount').textContent = result.data.voteCount || 0;

                if (result.data.hasRegistered) {
                    document.getElementById('registerBtn').style.display = 'none';
                    document.getElementById('registeredText').style.display = 'inline';
                }

                // 处理投票状态
                if (result.data.hasVoted) {
                    document.getElementById('voteBtn').style.display = 'none';
                    document.getElementById('votedText').style.display = 'inline';
                }

                // 如果是多人活动，加载已有组信息
                if (result.data.type === 2) {
                    loadGroups();
                } else {
                    document.getElementById('groupNameDiv').style.display = 'none';
                }
            }
        }

        async function loadGroups() {
            const result = await get('/api/activity/' + activityId + '/group-names');
            if (result.code === 200 && result.data) {
                groups = result.data;
                // 更新提示信息
                updateGroupHint();
            }
        }

        function updateGroupHint() {
            const hintSmall = document.querySelector('#groupNameDiv small');
            if (groups.length === 0) {
                hintSmall.innerHTML = '暂无已有小组，请输入新组名创建小组';
                hintSmall.style.color = '#e6a23c';
            } else {
                hintSmall.innerHTML = '多人活动需选择或输入组名，可选择已有小组或创建新小组';
                hintSmall.style.color = '#909399';
            }
        }

        async function vote() {
            const result = await post('/api/activity/' + activityId + '/vote');
            if (result.code === 200) {
                showMessage(result.message || '投票成功');
                loadActivity();
            } else {
                showMessage(result.message || '投票失败', 'error');
            }
        }

        function showRegisterModal() {
            document.getElementById('registerModal').classList.add('show');
            document.getElementById('groupName').value = '';
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').classList.remove('show');
            document.getElementById('groupName').value = '';
            document.getElementById('groupSuggestions').classList.remove('show');
        }

        // 组名输入自动补全
        document.getElementById('groupName').addEventListener('input', function(e) {
            const value = e.target.value.trim().toLowerCase();
            const suggestionsDiv = document.getElementById('groupSuggestions');

            if (value === '' || groups.length === 0) {
                suggestionsDiv.classList.remove('show');
                return;
            }

            const filtered = groups.filter(g =>
                g.groupName.toLowerCase().includes(value)
            );

            if (filtered.length === 0) {
                suggestionsDiv.classList.remove('show');
                return;
            }

            suggestionsDiv.innerHTML = filtered.map(g =>
                `<div class="group-suggestion-item" onclick="selectGroup('${g.groupName}')">${g.groupName} <span style="color: #909399; font-size: 12px;">(${g.memberCount}人)</span></div>`
            ).join('');
            suggestionsDiv.classList.add('show');
        });

        document.getElementById('groupName').addEventListener('focus', function(e) {
            const value = e.target.value.trim();
            if (value === '' && groups.length > 0) {
                // 显示所有组名和人数
                const suggestionsDiv = document.getElementById('groupSuggestions');
                suggestionsDiv.innerHTML = groups.map(g =>
                    `<div class="group-suggestion-item" onclick="selectGroup('${g.groupName}')">${g.groupName} <span style="color: #909399; font-size: 12px;">(${g.memberCount}人)</span></div>`
                ).join('');
                suggestionsDiv.classList.add('show');
            }
        });

        function selectGroup(name) {
            document.getElementById('groupName').value = name;
            document.getElementById('groupSuggestions').classList.remove('show');
        }

        // 点击其他地方关闭建议列表
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#groupName') && !e.target.closest('#groupSuggestions')) {
                document.getElementById('groupSuggestions').classList.remove('show');
            }
        });

        async function register() {
            const groupName = document.getElementById('groupName').value.trim();

            // 多人活动时组名必填
            if (currentActivity && currentActivity.type === 2 && !groupName) {
                showMessage('多人活动请选择或输入组名', 'error');
                return;
            }

            const result = await post('/api/activity/' + activityId + '/register', { groupName });
            if (result.code === 200) {
                showMessage('报名成功');
                closeRegisterModal();
                document.getElementById('registerBtn').style.display = 'none';
                document.getElementById('registeredText').style.display = 'inline';
            } else {
                showMessage(result.message || '报名失败', 'error');
            }
        }

        async function loadComments() {
            const result = await get('/api/activity/' + activityId + '/comments');
            if (result.code === 200 && result.data) {
                const list = document.getElementById('commentList');
                if (result.data.length === 0) {
                    list.innerHTML = '<p style="color: #909399; text-align: center; padding: 20px;">暂无评论</p>';
                    return;
                }
                list.innerHTML = result.data.map(item => `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-author">${item.userName || '用户'}</span>
                            <span class="comment-time">${formatDateTime(item.createTime)}</span>
                        </div>
                        <div class="comment-content">${item.content}</div>
                        ${item.userId === userInfo.userId ? `
                            <div class="comment-actions">
                                <button class="btn btn-danger btn-small" onclick="deleteComment(${item.cmId})">删除</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }
        }

        async function submitComment() {
            const content = document.getElementById('commentContent').value.trim();
            if (!content) {
                showMessage('请输入评论内容', 'error');
                return;
            }

            const result = await post('/api/activity/' + activityId + '/comment', { content });
            if (result.code === 200) {
                showMessage('评论成功');
                document.getElementById('commentContent').value = '';
                loadComments();
            } else {
                showMessage(result.message || '评论失败', 'error');
            }
        }

        async function deleteComment(cmId) {
            if (!confirm('确定要删除此评论吗？')) return;

            const result = await del('/api/activity/comment/' + cmId);
            if (result.code === 200) {
                showMessage('删除成功');
                loadComments();
            } else {
                showMessage(result.message || '删除失败', 'error');
            }
        }

        loadActivity();
        loadComments();
    </script>
</body>
</html>
