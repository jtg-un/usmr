<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统</div>
        <div class="nav-links">
            <a href="user-index.html">首页</a>
            <a href="user-profile.html" class="active">个人信息</a>
            <a href="user-notice.html">校园公告</a>
            <a href="user-activity.html">活动报名</a>
            <a href="user-salary.html">工资查询</a>
            <a href="user-relative.html">亲属管理</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>个人信息管理</h3>
            </div>

            <form id="profileForm">
                <!-- 照片上传 -->
                <div class="profile-photo">
                    <img id="photoPreview" src="../../images/default-avatar.svg" alt="头像">
                    <div style="margin-top: 10px;">
                        <input type="file" id="photoFile" accept="image/*" style="display: none;">
                        <button type="button" class="btn btn-primary btn-small" onclick="document.getElementById('photoFile').click()">上传照片</button>
                    </div>
                </div>

                <div class="profile-section">
                    <div class="form-group">
                        <label>姓名 <span style="color: red;">*</span></label>
                        <input type="text" id="realName" name="realName" required>
                    </div>

                    <div class="form-group">
                        <label>性别</label>
                        <select id="gender" name="gender">
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>身份证号</label>
                        <input type="text" id="idCard" name="idCard" maxlength="18">
                    </div>

                    <div class="form-group">
                        <label>年龄</label>
                        <input type="number" id="age" name="age" min="0" max="150">
                    </div>

                    <div class="form-group">
                        <label>民族</label>
                        <input type="text" id="nation" name="nation">
                    </div>

                    <div class="form-group">
                        <label>学历</label>
                        <select id="education" name="education">
                            <option value="">请选择</option>
                            <option value="小学">小学</option>
                            <option value="初中">初中</option>
                            <option value="高中">高中</option>
                            <option value="中专">中专</option>
                            <option value="大专">大专</option>
                            <option value="本科">本科</option>
                            <option value="硕士">硕士</option>
                            <option value="博士">博士</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>籍贯</label>
                        <input type="text" id="nativePlace" name="nativePlace">
                    </div>

                    <div class="form-group">
                        <label>参加工作时间</label>
                        <input type="date" id="workStartDate" name="workStartDate">
                    </div>

                    <div class="form-group">
                        <label>退休时间</label>
                        <input type="date" id="retireDate" name="retireDate">
                    </div>

                    <div class="form-group">
                        <label>退休前所在单位</label>
                        <input type="text" id="formerDept" name="formerDept">
                    </div>

                    <div class="form-group">
                        <label>职称/职务</label>
                        <input type="text" id="jobTitle" name="jobTitle">
                    </div>
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="width: 200px;">保存信息</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        // 当前照片路径
        let currentPhotoPath = '';

        // 检查登录
        if (!checkLogin()) {
            window.location.href = '../../login.html';
        }

        // 渲染用户信息
        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>欢迎, ${userInfo.realName || userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        // 加载个人信息
        async function loadProfile() {
            const result = await get('/api/profile');
            if (result.code === 200 && result.data) {
                const data = result.data;
                document.getElementById('realName').value = data.realName || '';
                document.getElementById('gender').value = data.gender || '';
                document.getElementById('idCard').value = data.idCard || '';
                document.getElementById('age').value = data.age || '';
                document.getElementById('nation').value = data.nation || '';
                document.getElementById('education').value = data.education || '';
                document.getElementById('nativePlace').value = data.nativePlace || '';
                document.getElementById('workStartDate').value = data.workStartDate || '';
                document.getElementById('retireDate').value = data.retireDate || '';
                document.getElementById('formerDept').value = data.formerDept || '';
                document.getElementById('jobTitle').value = data.jobTitle || '';

                if (data.photo) {
                    currentPhotoPath = data.photo;
                    document.getElementById('photoPreview').src = data.photo;
                }
            }
        }

        // 照片上传预览
        document.getElementById('photoFile').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                // 检查文件类型
                if (!file.type.startsWith('image/')) {
                    showMessage('请选择图片文件', 'error');
                    return;
                }

                // 检查文件大小 (最大5MB)
                if (file.size > 5 * 1024 * 1024) {
                    showMessage('图片大小不能超过5MB', 'error');
                    return;
                }

                // 先显示本地预览
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                };
                reader.readAsDataURL(file);

                // 上传到服务器
                const formData = new FormData();
                formData.append('file', file);

                try {
                    showMessage('正在上传...', 'info');
                    const token = localStorage.getItem('token');
                    // 使用相对路径，避免硬编码context path
                    const response = await fetch('../../api/upload/photo', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token
                        },
                        body: formData
                    });

                    const result = await response.json();
                    console.log('上传结果:', result);

                    if (result.code === 200) {
                        currentPhotoPath = result.data;
                        // 显示服务器返回的图片URL
                        document.getElementById('photoPreview').src = result.data;
                        showMessage('照片上传成功');
                        console.log('图片路径:', result.data);
                    } else {
                        showMessage(result.message || '上传失败', 'error');
                    }
                } catch (error) {
                    console.error('上传错误:', error);
                    showMessage('上传失败: ' + error.message, 'error');
                }
            }
        });

        // 保存个人信息
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                realName: document.getElementById('realName').value,
                gender: document.getElementById('gender').value,
                idCard: document.getElementById('idCard').value,
                age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
                nation: document.getElementById('nation').value,
                education: document.getElementById('education').value,
                nativePlace: document.getElementById('nativePlace').value,
                workStartDate: document.getElementById('workStartDate').value || null,
                retireDate: document.getElementById('retireDate').value || null,
                formerDept: document.getElementById('formerDept').value,
                jobTitle: document.getElementById('jobTitle').value,
                photo: currentPhotoPath || null
            };

            console.log('保存数据:', data);

            const result = await post('/api/profile', data);
            console.log('保存结果:', result);

            if (result.code === 200) {
                showMessage('保存成功');
                // 更新本地存储
                userInfo.realName = data.realName;
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
            } else {
                showMessage(result.message || '保存失败', 'error');
            }
        });

        loadProfile();
    </script>
</body>
</html>
