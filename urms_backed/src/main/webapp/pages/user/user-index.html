<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统</div>
        <div class="nav-links">
            <a href="user-index.html" class="active">首页</a>
            <a href="user-profile.html">个人信息</a>
            <a href="user-notice.html">校园公告</a>
            <a href="user-activity.html">活动报名</a>
            <a href="user-salary.html">工资查询</a>
            <a href="user-relative.html">亲属管理</a>
            <a href="user-message.html">站内留言</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <!-- 欢迎区域 -->
        <div class="card">
            <h2 id="welcomeText">欢迎您！</h2>
            <p style="color: #909399; margin-top: 10px;">以下是您的个人信息概览</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px;">
            <!-- 待办事项 -->
            <div class="card">
                <div class="card-header">
                    <h3>待处理事项</h3>
                </div>
                <div id="todoList">
                    <p style="color: #909399;">暂无待处理事项</p>
                </div>
            </div>

            <!-- 最新公告 -->
            <div class="card">
                <div class="card-header">
                    <h3>最新公告</h3>
                    <a href="user-notice.html">更多</a>
                </div>
                <div id="noticeList"></div>
            </div>

            <!-- 近期活动 -->
            <div class="card">
                <div class="card-header">
                    <h3>近期活动</h3>
                    <a href="user-activity.html">更多</a>
                </div>
                <div id="activityList"></div>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        // 检查登录
        if (!checkLogin()) {
            window.location.href = '../../login.html';
        }

        // 渲染用户信息
        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>欢迎, ${userInfo.realName || userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
            document.getElementById('welcomeText').textContent = `欢迎您，${userInfo.realName || userInfo.username}！`;
        }

        // 加载最新公告
        async function loadNotices() {
            const result = await get('/api/notice/list');
            if (result.code === 200 && result.data && result.data.length > 0) {
                const list = document.getElementById('noticeList');
                list.innerHTML = result.data.slice(0, 5).map(item => `
                    <div style="padding: 10px 0; border-bottom: 1px solid #ebeef5;">
                        <a href="user-notice-detail.html?id=${item.noticeId}">${item.title}</a>
                        <div style="font-size: 12px; color: #909399; margin-top: 5px;">${formatDateTime(item.publishTime)}</div>
                    </div>
                `).join('');
            }
        }

        // 加载近期活动
        async function loadActivities() {
            const result = await get('/api/activity/list');
            if (result.code === 200 && result.data && result.data.length > 0) {
                const list = document.getElementById('activityList');
                list.innerHTML = result.data.slice(0, 5).map(item => `
                    <div style="padding: 10px 0; border-bottom: 1px solid #ebeef5;">
                        <a href="user-activity-detail.html?id=${item.activityId}">${item.title}</a>
                        <div style="font-size: 12px; color: #909399; margin-top: 5px;">
                            ${formatDateTime(item.startTime)}
                        </div>
                    </div>
                `).join('');
            }
        }

        loadNotices();
        loadActivities();
    </script>
</body>
</html>
