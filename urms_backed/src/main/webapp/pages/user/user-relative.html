<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亲属管理 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">大学退休教职工管理系统</div>
        <div class="nav-links">
            <a href="user-index.html">首页</a>
            <a href="user-profile.html">个人信息</a>
            <a href="user-notice.html">校园公告</a>
            <a href="user-activity.html">活动报名</a>
            <a href="user-salary.html">工资查询</a>
            <a href="user-relative.html" class="active">亲属管理</a>
            <a href="user-message.html">站内留言</a>
        </div>
        <div class="user-info" id="userInfo"></div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div class="card">
            <div class="card-header">
                <h3>亲属信息</h3>
                <button class="btn btn-primary" onclick="showAddModal()">添加亲属</button>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>关系</th>
                        <th>姓名</th>
                        <th>住址</th>
                        <th>居住面积</th>
                        <th>电话</th>
                        <th>邮箱</th>
                        <th>工作单位</th>
                        <th>QQ/微信</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="relativeList"></tbody>
            </table>
        </div>
    </div>

    <!-- 添加/编辑亲属模态框 -->
    <div class="modal" id="relativeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加亲属</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="relativeForm">
                <input type="hidden" id="relativeId">
                <div class="form-group">
                    <label>关系类型 <span style="color: red;">*</span></label>
                    <select id="relationType" required>
                        <option value="">请选择</option>
                        <option value="配偶">配偶</option>
                        <option value="子女">子女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>姓名 <span style="color: red;">*</span></label>
                    <input type="text" id="relName" required>
                </div>
                <div class="form-group">
                    <label>住址</label>
                    <input type="text" id="relAddress">
                </div>
                <div class="form-group">
                    <label>居住面积（平方米）</label>
                    <input type="number" id="relLivingArea" step="0.01">
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" id="relPhone">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="relEmail">
                </div>
                <div class="form-group">
                    <label>工作单位</label>
                    <input type="text" id="relWorkplace">
                </div>
                <div class="form-group">
                    <label>QQ/微信</label>
                    <input type="text" id="relQqWechat">
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitRelative()">保存</button>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script>
        if (!checkLogin()) window.location.href = '../../login.html';

        const userInfo = getUserInfo();
        if (userInfo) {
            document.getElementById('userInfo').innerHTML = `
                <span>欢迎, ${userInfo.realName || userInfo.username}</span>
                <span class="logout" onclick="logout()">退出</span>
            `;
        }

        async function loadRelatives() {
            const result = await get('/api/relative/my-relatives');
            if (result.code === 200 && result.data) {
                const tbody = document.getElementById('relativeList');
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; color: #909399;">暂无亲属信息</td></tr>';
                    return;
                }
                tbody.innerHTML = result.data.map(item => `
                    <tr>
                        <td>${item.relationType || '-'}</td>
                        <td>${item.name || '-'}</td>
                        <td>${item.address || '-'}</td>
                        <td>${item.livingArea ? item.livingArea + '㎡' : '-'}</td>
                        <td>${item.phone || '-'}</td>
                        <td>${item.email || '-'}</td>
                        <td>${item.workplace || '-'}</td>
                        <td>${item.qqWechat || '-'}</td>
                        <td>
                            <button class="btn btn-primary btn-small" onclick="editRelative(${item.relativeId})">编辑</button>
                            <button class="btn btn-danger btn-small" onclick="deleteRelative(${item.relativeId})">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '添加亲属';
            document.getElementById('relativeId').value = '';
            document.getElementById('relativeForm').reset();
            document.getElementById('relativeModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('relativeModal').classList.remove('show');
        }

        async function editRelative(id) {
            const result = await get('/api/relative/my-relatives');
            if (result.code === 200 && result.data) {
                const item = result.data.find(r => r.relativeId === id);
                if (item) {
                    document.getElementById('modalTitle').textContent = '编辑亲属';
                    document.getElementById('relativeId').value = item.relativeId;
                    document.getElementById('relationType').value = item.relationType || '';
                    document.getElementById('relName').value = item.name || '';
                    document.getElementById('relAddress').value = item.address || '';
                    document.getElementById('relLivingArea').value = item.livingArea || '';
                    document.getElementById('relPhone').value = item.phone || '';
                    document.getElementById('relEmail').value = item.email || '';
                    document.getElementById('relWorkplace').value = item.workplace || '';
                    document.getElementById('relQqWechat').value = item.qqWechat || '';
                    document.getElementById('relativeModal').classList.add('show');
                }
            }
        }

        async function submitRelative() {
            const id = document.getElementById('relativeId').value;
            const data = {
                relationType: document.getElementById('relationType').value,
                name: document.getElementById('relName').value,
                address: document.getElementById('relAddress').value,
                livingArea: document.getElementById('relLivingArea').value || null,
                phone: document.getElementById('relPhone').value,
                email: document.getElementById('relEmail').value,
                workplace: document.getElementById('relWorkplace').value,
                qqWechat: document.getElementById('relQqWechat').value
            };

            if (!data.relationType || !data.name) {
                showMessage('请填写必填项', 'error');
                return;
            }

            let result;
            if (id) {
                data.relativeId = parseInt(id);
                result = await post('/api/relative/update', data);
            } else {
                result = await post('/api/relative/add', data);
            }

            if (result.code === 200) {
                showMessage('保存成功');
                closeModal();
                loadRelatives();
            } else {
                showMessage(result.message || '保存失败', 'error');
            }
        }

        async function deleteRelative(id) {
            if (!confirm('确定要删除此亲属信息吗？')) return;

            const result = await del('/api/relative/' + id);
            if (result.code === 200) {
                showMessage('删除成功');
                loadRelatives();
            } else {
                showMessage(result.message || '删除失败', 'error');
            }
        }

        loadRelatives();
    </script>
</body>
</html>
