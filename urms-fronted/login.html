<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 高校退休教职工管理服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f0f2f5;
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            font-size: 18px;
        }

        /* 顶部条 */
        .top-bar {
            height: 90px;
            background: linear-gradient(135deg, #1a3a6e 0%, #2c5aa0 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .top-bar .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .top-bar .logo-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .top-bar .system-title h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 4px;
            color: white;
        }

        .top-bar .system-title p {
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 2px;
            color: white;
        }

        .btn-back {
            padding: 12px 30px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.25);
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 90px);
            padding: 40px;
        }

        /* 登录框 */
        .login-wrapper {
            display: flex;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 1000px;
            min-height: 550px;
        }

        /* 左侧图片区 */
        .login-banner {
            width: 500px;
            background: linear-gradient(rgba(26,58,110,0.7), rgba(44,90,160,0.7)), url('../images/university/campus.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            color: white;
            position: relative;
        }

        .login-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><circle cx="50" cy="50" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>');
            background-size: 200px 200px;
            opacity: 0.5;
        }

        .login-banner .banner-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-banner .banner-icon {
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            border: 3px solid rgba(255,255,255,0.3);
            font-size: 70px;
        }

        .login-banner h2 {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .login-banner p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 2;
        }

        /* 右侧登录表单 */
        .login-form-area {
            flex: 1;
            padding: 60px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form-area h3 {
            font-size: 30px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .login-form-area .subtitle {
            color: #999;
            font-size: 18px;
            margin-bottom: 50px;
        }

        .form-item {
            margin-bottom: 30px;
        }

        .form-item label {
            display: block;
            color: #333;
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .form-item .input-wrapper {
            position: relative;
        }

        .form-item .input-wrapper .icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: #999;
        }

        .form-item input {
            width: 100%;
            height: 60px;
            border: 2px solid #dcdfe6;
            border-radius: 10px;
            padding: 0 60px;
            font-size: 20px;
            transition: all 0.3s;
        }

        .form-item input:focus {
            outline: none;
            border-color: #2c5aa0;
            box-shadow: 0 0 0 4px rgba(44, 90, 160, 0.1);
        }

        .form-item input::placeholder {
            color: #c0c4cc;
        }

        .form-item .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            padding: 5px;
        }

        .form-item .toggle-password:hover {
            color: #2c5aa0;
        }

        .btn-login {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #1a3a6e 0%, #2c5aa0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 8px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #16315c 0%, #254a8a 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 90, 160, 0.4);
        }

        .btn-login:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
            transform: none;
        }

        /* 测试账号 */
        .test-account {
            margin-top: 40px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
            border-left: 4px solid #2c5aa0;
        }

        .test-account h4 {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
        }

        .test-account p {
            font-size: 18px;
            color: #666;
            line-height: 2;
        }

        /* 底部版权 */
        .footer {
            text-align: center;
            padding: 25px;
            color: #999;
            font-size: 16px;
        }

        /* 响应式 */
        @media (max-width: 992px) {
            .login-wrapper {
                flex-direction: column;
                width: 100%;
                max-width: 500px;
            }
            .login-banner {
                width: 100%;
                padding: 40px;
            }
            .login-banner h2 { font-size: 28px; }
            .login-banner .banner-icon { width: 100px; height: 100px; font-size: 50px; }
            .login-form-area { padding: 40px; }
        }
    </style>
</head>
<body>
    <!-- 顶部条 -->
    <div class="top-bar">
        <div class="logo-area">
            <div class="logo-icon">🎓</div>
            <div class="system-title">
                <h1>高校退休教职工管理服务平台</h1>
                <p>University Retired Staff Management System</p>
            </div>
        </div>
        <a href="index.html" class="btn-back">🏠 返回首页</a>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="login-wrapper">
            <!-- 左侧横幅 -->
            <div class="login-banner">
                <div class="banner-content">
                    <div class="banner-icon">🔐</div>
                    <h2>欢迎登录</h2>
                    <p>本系统为大学退休教职工提供<br>信息管理、活动报名、工资查询等服务</p>
                </div>
            </div>

            <!-- 右侧表单 -->
            <div class="login-form-area">
                <h3>用户登录</h3>
                <p class="subtitle">请输入您的账号信息</p>

                <form @submit.prevent="handleLogin">
                    <div class="form-item">
                        <label>工号</label>
                        <div class="input-wrapper">
                            <span class="icon">👤</span>
                            <input type="text" v-model="form.username" placeholder="请输入工号" required>
                        </div>
                    </div>

                    <div class="form-item">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <span class="icon">🔒</span>
                            <input :type="showPassword ? 'text' : 'password'" v-model="form.password" placeholder="请输入密码" required>
                            <button type="button" class="toggle-password" @click="showPassword = !showPassword">
                                {{ showPassword ? '👁️' : '🙈' }}
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" :disabled="loading">
                        {{ loading ? '登录中...' : '登 录' }}
                    </button>
                </form>

                <div class="test-account">
                    <h4>📌 测试账号</h4>
                    <p>
                        管理员账号：admin / admin<br>
                        退休人员账号：user1 / 123456
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 高校退休教职工管理服务平台 版权所有
    </div>

    <script src="js/vue.min.js"></script>
    <script src="js/axios.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        new Vue({
            el: '.main-content',
            data: {
                form: {
                    username: '',
                    password: ''
                },
                loading: false,
                showPassword: false
            },
            methods: {
                async handleLogin() {
                    if (!this.form.username.trim() || !this.form.password) {
                        showMessage('请输入工号和密码', 'error');
                        return;
                    }

                    this.loading = true;
                    try {
                        // 对密码进行MD5加密后再传输
                        const encryptedPassword = md5(this.form.password);

                        const result = await post('/auth/login', {
                            username: this.form.username.trim(),
                            password: encryptedPassword
                        });

                        localStorage.setItem('token', result.data.token);
                        localStorage.setItem('userInfo', JSON.stringify(result.data));

                        showMessage('登录成功', 'success');

                        setTimeout(() => {
                            if (result.data.role === 2) {
                                window.location.href = 'pages/admin/admin-index.html';
                            } else {
                                window.location.href = 'pages/user/user-index.html';
                            }
                        }, 1500);
                    } catch (error) {
                        console.error('登录错误:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        });
    </script>
</body>
</html>
