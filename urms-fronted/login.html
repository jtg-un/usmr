<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 大学退休教职工管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="login-container">
        <div class="login-box">
            <h2>大学退休教职工管理系统</h2>
            <form @submit.prevent="handleLogin">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" v-model="form.username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" v-model="form.password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary" :disabled="loading">
                    {{ loading ? '登录中...' : '登 录' }}
                </button>
            </form>
            <p style="margin-top: 20px; text-align: center; color: #909399; font-size: 12px;">
                测试账号: admin/admin (管理员) | user1/123456 (退休人员)
            </p>
        </div>
    </div>

    <script src="js/vue.min.js"></script>
    <script src="js/axios.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                form: {
                    username: '',
                    password: ''
                },
                loading: false
            },
            methods: {
                async handleLogin() {
                    if (!this.form.username.trim() || !this.form.password) {
                        showMessage('请输入用户名和密码', 'error');
                        return;
                    }

                    this.loading = true;
                    try {
                        const result = await post('/auth/login', {
                            username: this.form.username.trim(),
                            password: this.form.password
                        });

                        // 保存登录信息
                        localStorage.setItem('token', result.data.token);
                        localStorage.setItem('userInfo', JSON.stringify(result.data));

                        showMessage('登录成功', 'success');

                        // 根据角色跳转
                        setTimeout(() => {
                            if (result.data.role === 2) {
                                window.location.href = 'pages/admin/admin-index.html';
                            } else {
                                window.location.href = 'pages/user/user-index.html';
                            }
                        }, 1000);
                    } catch (error) {
                        console.error('登录错误:', error);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        });
    </script>
</body>
</html>
