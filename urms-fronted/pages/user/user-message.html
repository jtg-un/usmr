<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站内留言 - 高校退休教职工管理服务平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #f0f2f5; font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif; font-size: 18px; }
        .header { height: 70px; background: linear-gradient(90deg, #1a3a6e 0%, #2c5aa0 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header .logo { display: flex; align-items: center; gap: 12px; color: white; }
        .header .logo svg { width: 36px; height: 36px; fill: white; }
        .header .logo h1 { font-size: 22px; font-weight: 600; letter-spacing: 2px; }
        .header .user-info { display: flex; align-items: center; gap: 20px; color: white; }
        .header .user-info span { font-size: 18px; }
        .header .user-info .logout-btn { padding: 10px 24px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: white; cursor: pointer; font-size: 17px; }
        .main-layout { display: flex; padding-top: 70px; min-height: 100vh; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #e8e8e8; position: fixed; top: 70px; left: 0; bottom: 0; overflow-y: auto; }
        .sidebar .menu-title { padding: 18px 25px; font-size: 16px; color: #999; background: #fafafa; border-bottom: 1px solid #e8e8e8; }
        .sidebar .menu-item { display: block; padding: 18px 25px; color: #333; text-decoration: none; font-size: 18px; border-bottom: 1px solid #f0f0f0; transition: all 0.3s; }
        .sidebar .menu-item:hover { background: #e6f0fa; color: #2c5aa0; }
        .sidebar .menu-item.active { background: #e6f0fa; color: #2c5aa0; border-left: 4px solid #2c5aa0; font-weight: 600; }
        .sidebar .menu-item svg { width: 20px; height: 20px; fill: currentColor; margin-right: 12px; vertical-align: middle; margin-top: -2px; }
        .content-area { flex: 1; margin-left: 240px; padding: 25px; min-height: calc(100vh - 70px); }
        .breadcrumb { background: #fff; padding: 15px 25px; margin-bottom: 25px; border-radius: 6px; font-size: 16px; color: #666; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .breadcrumb a { color: #2c5aa0; text-decoration: none; }
        .guide-tip { background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 6px; padding: 15px 20px; margin-bottom: 25px; font-size: 17px; color: #0050b3; display: flex; align-items: center; gap: 10px; }
        .guide-tip svg { width: 22px; height: 22px; fill: #1890ff; flex-shrink: 0; }
        .page-card { background: #fff; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .page-card .card-header { padding: 18px 25px; border-bottom: 1px solid #f0f0f0; }
        .page-card .card-header h3 { font-size: 20px; color: #333; font-weight: 600; }
        .page-card .card-body { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 17px; color: #333; margin-bottom: 10px; font-weight: 500; }
        .form-group textarea { width: 100%; height: 150px; resize: vertical; padding: 15px; border: 2px solid #d9d9d9; border-radius: 6px; font-size: 17px; }
        .form-group textarea:focus { outline: none; border-color: #2c5aa0; }
        .btn { padding: 14px 35px; border-radius: 6px; cursor: pointer; font-size: 18px; border: none; font-weight: 500; }
        .btn-primary { background: #2c5aa0; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-small { padding: 10px 20px; font-size: 16px; }
        .message-item { padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
        .message-item:last-child { border-bottom: none; }
        .message-item .message-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .message-item .message-time { font-size: 16px; color: #999; }
        .message-item .message-content { font-size: 18px; color: #333; line-height: 1.8; }
        .message-item .message-reply { margin-top: 15px; padding: 15px; background: #f5f7fa; border-radius: 6px; border-left: 4px solid #2c5aa0; }
        .message-item .message-reply strong { color: #2c5aa0; font-size: 17px; }
        .message-item .message-reply div { margin-top: 8px; font-size: 17px; color: #666; line-height: 1.6; }
        .empty-tip { text-align: center; color: #999; padding: 50px 25px; font-size: 18px; }
        .message { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border-radius: 6px; z-index: 9999; font-size: 17px; }
        .message.success { background: #f0f9eb; color: #67c23a; border: 1px solid #e1f3d8; }
        .message.error { background: #fef0f0; color: #f56c6c; border: 1px solid #fde2e2; }
        @media (max-width: 768px) { .sidebar { display: none; } .content-area { margin-left: 0; } }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg><h1>高校退休教职工管理服务平台</h1></div>
            <div class="user-info"><span>欢迎您，{{ userInfo.realName || userInfo.username }}</span><button class="logout-btn" @click="logout">退出登录</button></div>
        </header>
        <div class="main-layout">
            <aside class="sidebar">
                <div class="menu-title">功能菜单</div>
                <a href="user-index.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>首页</a>
                <a href="user-profile.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>个人信息</a>
                <a href="user-notice.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>校园公告</a>
                <a href="user-activity.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>活动报名</a>
                <a href="user-salary.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>工资查询</a>
                <a href="user-relative.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>亲属管理</a>
                <a href="user-message.html" class="menu-item active"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>站内留言</a>
            </aside>
            <main class="content-area">
                <div class="breadcrumb"><a href="user-index.html">首页</a> / 站内留言</div>

                <div class="page-card">
                    <div class="card-header"><h3>提交留言</h3></div>
                    <div class="card-body">
                        <div class="guide-tip">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                            <span>提示：在此向管理员提交您的意见或建议。</span>
                        </div>
                        <div class="form-group"><label>留言内容 <span style="color:#f5222d;">*</span></label><textarea v-model="messageContent" placeholder="请输入您的意见或建议..."></textarea></div>
                        <button class="btn btn-primary" @click="submitMessage">提交留言</button>
                    </div>
                </div>

                <div class="page-card">
                    <div class="card-header"><h3>我的留言记录</h3></div>
                    <div class="card-body">
                        <div v-for="item in messages" :key="item.cmId" class="message-item">
                            <div class="message-header">
                                <span class="message-time">{{ formatDateTime(item.createTime) }}</span>
                                <button class="btn btn-danger btn-small" @click="deleteMessage(item.cmId)">删除</button>
                            </div>
                            <div class="message-content">{{ item.content }}</div>
                            <div v-if="item.reply" class="message-reply">
                                <strong>管理员回复：</strong>
                                <div>{{ item.reply }}</div>
                            </div>
                        </div>
                        <div v-if="messages.length === 0" class="empty-tip">暂无留言记录，在上方提交您的第一条留言吧！</div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../../js/vue.min.js"></script>
    <script src="../../js/axios.min.js"></script>
    <script src="../../js/common.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: { userInfo: {}, messages: [], messageContent: '' },
            created() { if (!checkLogin()) window.location.href = '../../login.html'; this.userInfo = getUserInfo() || {}; this.loadMessages(); },
            methods: {
                async loadMessages() { try { const result = await get('/api/message/my-messages'); if (result.data) { this.messages = result.data; } } catch (e) {} },
                async submitMessage() { if (!this.messageContent.trim()) { showMessage('请输入留言内容', 'error'); return; } try { await post('/api/message/submit', { content: this.messageContent.trim() }); showMessage('留言提交成功，请等待管理员回复'); this.messageContent = ''; this.loadMessages(); } catch (e) {} },
                async deleteMessage(cmId) { if (!confirm('确定要删除此留言吗？')) return; try { await del('/api/message/' + cmId); showMessage('删除成功'); this.loadMessages(); } catch (e) {} }
            }
        });
    </script>
</body>
</html>
